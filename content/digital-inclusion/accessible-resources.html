<!DOCTYPE html>
<html lang="en">
<head>
<!-- 21/07/26 v1 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make resources accessible with digital tools | The Learning Studio</title>
<meta name="description" content="A Digital Practice Card for staff making resources accessible with digital, WCAG-aware tools.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/tokens.css">
<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/card.css">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="site-header">
  <div>
    <h1 class="site-title">The Learning Studio</h1>
    <p class="strapline">Tell me what you're trying to do — I'll show you a digital, accessible way to do it.</p>
  </div>

  <section class="a11y-controls" aria-label="Accessibility settings">
    <button type="button" id="a11y-text-size" data-a11y-control="text-size" aria-pressed="false">
      Text size: Default
    </button>
    <button type="button" id="a11y-contrast" data-a11y-control="contrast" aria-pressed="false">
      High contrast
    </button>
    <button type="button" id="a11y-motion" data-a11y-control="motion" aria-pressed="false">
      Reduce motion
    </button>
    <p id="a11y-status" class="visually-hidden" role="status" aria-live="polite"></p>
  </section>
</header>

<main id="main-content">
  <div class="content-container">
    <article class="practice-card" data-card-src="accessible-resources.json">
      <p>Loading card…</p>
    </article>
  </div>
</main>

<script src="../../assets/js/accessibility.js"></script>
<script src="../../assets/js/render-card.js"></script>
</body>
</html>
